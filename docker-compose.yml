services:
  mariadb:
    image: mariadb:11.4
    container_name: grievance-ledger-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: grievance_ledger
      MARIADB_USER: ledger
      MARIADB_PASSWORD: ledgerpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./app
    container_name: grievance-ledger-api
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: grievance_ledger
      DB_USER: ledger
      DB_PASSWORD: ledgerpass
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
