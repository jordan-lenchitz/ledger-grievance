name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-app
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache-dependency-path: go-app/go.sum

    - name: Build
      run: go build ./cmd/server/...

    - name: Test
      run: go test -count=1 ./internal/service/...
 
